<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Widget</title>
</head>
<body>
  <div id="widget-wrap">
    <!-- Верхний баннер (изображение) -->
    <div id="top-banner" class="banner banner-top">
      <img id="top-banner-img" src="" alt="" />
    </div>

    <!-- Список сообщений -->
    <div id="chat-container">
      <!-- Подложка: фото на весь блок чата (позади сообщений) -->
      <div id="chat-bg"></div>
      <ul id="chat-list"></ul>
    </div>

    <!-- Нижний баннер (изображение) -->
    <div id="bottom-banner" class="banner banner-bottom">
      <img id="bottom-banner-img" src="" alt="" />
    </div>
  </div>
</body>
</html>
